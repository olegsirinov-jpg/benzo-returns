---
deployment:
  tasks:
    # Абсолютний шлях до каталогу сайту (Document Root субдомену returns).
    # ВАЖЛИВО: тільки абсолютний — cPanel виконує задачі з папки репозиторію,
    # тому відносний шлях розклав би файли не туди.
    - export DEPLOYPATH=/home/obp90408/public_html/benzo-returns
    - /bin/mkdir -p "$DEPLOYPATH"

    # Копіюємо код у каталог сайту.
    # .env, uploads/ та storage/logs/ виключені: їх немає в git, а --exclude
    # захищає наявні на сервері (ключі, фото клієнтів, логи) від видалення.
    - >
      /bin/rsync -a --delete
      --exclude='.git'
      --exclude='.github'
      --exclude='.cpanel.yml'
      --exclude='.env'
      --exclude='.env.example'
      --exclude='install.php'
      --exclude='install/'
      --exclude='DEPLOY.md'
      --exclude='README.md'
      --exclude='uploads/'
      --exclude='storage/logs/'
      ./ "$DEPLOYPATH/"

    # Каталоги для даних + права на запис
    - /bin/mkdir -p "$DEPLOYPATH/uploads" "$DEPLOYPATH/storage/logs"
    - /bin/chmod -R 0775 "$DEPLOYPATH/uploads" "$DEPLOYPATH/storage/logs"

    # Захисний .htaccess для uploads (блокує виконання скриптів), якщо його ще немає
    - test -f "$DEPLOYPATH/uploads/.htaccess" || /bin/cp uploads/.htaccess "$DEPLOYPATH/uploads/.htaccess"
